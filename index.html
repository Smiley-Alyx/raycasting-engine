<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Рейкастовый движок</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link rel="shortcut icon" href="logo.png" type="image/x-icon" />
  </head>

  <body>
    <div class="app">
      <div class="frame" id="frame">
        <main id="canvas1" class="viewport">
          <div class="menu" id="menuRoot">
            <div class="menu-box">
              <div class="menu-title">Raycasting</div>
              <div class="menu-subtitle">Old-school demo</div>
              <div class="menu-buttons">
                <div id="menuDifficulty"></div>
                <div id="menuLevels"></div>
                <button class="btn" id="menuEditorBtn" type="button">Level Editor (soon)</button>
              </div>
            </div>
          </div>

          <div class="menu" id="deathRoot" style="display: none">
            <div class="menu-box">
              <div class="menu-title">You Die</div>
              <div class="menu-subtitle">Press restart to try again</div>
              <div class="menu-buttons">
                <button class="btn" id="deathRestartBtn" type="button">Restart</button>
              </div>
            </div>
          </div>

          <div id="bloodOverlay" class="blood-overlay" style="display: none"></div>
          <div style="display: none">
          <img id="wallAtlas" src="images/wall.png" />
          <img id="doorAtlas" src="images/door.png" />
          <img id="windowAtlas" src="images/window.png" />
          <img id="standAtlas" src="images/stand.png" />
          <img id="enemy" src="images/enemy.png" />
          </div>
          <script type="module" src="/src/game/main.ts"></script>
        </main>
        <aside class="sidebar">
          <section class="panel">
            <h2 class="panel-title">Status</h2>
            <div class="hint" id="hpText">HP: 100/100</div>
          </section>
          <section class="panel">
            <h2 class="panel-title">Controls</h2>
            <ul class="help-list">
              <li><span class="key">W/A/S/D</span> / <span class="key">Arrows</span> — движение</li>
              <li><span class="key">Shift</span> — спринт</li>
              <li><span class="key">E</span> — открыть дверь</li>
              <li><span class="key">Space</span> — выстрел</li>
              <li><span class="key">M</span> — карта</li>
              <li><span class="key">F</span> — fullscreen</li>
            </ul>
          </section>
          <section class="panel">
            <h2 class="panel-title">Audio</h2>
            <div class="control-group">
              <button class="btn" id="musicToggleBtn" type="button">Music: on</button>
              <label class="label">
                Music volume
                <input class="range" id="musicVolume" type="range" min="0" max="1" step="0.01" value="0.5" />
              </label>
              <button class="btn" id="sfxToggleBtn" type="button">SFX: on</button>
              <label class="label">
                SFX volume
                <input class="range" id="sfxVolume" type="range" min="0" max="1" step="0.01" value="0.7" />
              </label>
              <div class="hint">Первый клик по окну игры включает звук (ограничения браузера).</div>
            </div>
          </section>
          <section class="panel">
            <h2 class="panel-title">System</h2>
            <div class="control-group">
              <button class="btn" id="fullscreenBtn" type="button">Fullscreen</button>
            </div>
          </section>
        </aside>
      </div>
    </div>
  </body>
</html>
